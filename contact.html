<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – Bula Impact</title>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3616645892367242" crossorigin="anonymous"></script>
    
    <meta name="description" content="Get in touch with Bula Impact. We’d love to hear about your project.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <div class="mobile-background" id="mobile-background"></div>
    
    <div class="content">
        <div id="header-placeholder"></div>
        
        <main class="container">
            <section class="section">
                <h1 class="section-title">Get in Touch</h1>
                <div style="max-width:700px; margin:0 auto; text-align:center;">
                    <p>We’d love to hear about your project. Whether you’re ready to start or just exploring ideas, drop us a line.</p>
                    
                    <div class="contact-form">
                        <form action="https://formspree.io/f/xvgdodbl" method="POST">
                            <div class="form-group">
                                <label>Your Name</label>
                                <input type="text" name="name" required>
                            </div>
                            <div class="form-group">
                                <label>Your Email</label>
                                <input type="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label>Your Message</label>
                                <textarea name="message" rows="6" required></textarea>
                            </div>
                            
                            <div class="terms-checkbox" style="margin:20px 0; display:flex; align-items:center; gap:10px;">
                                <input type="checkbox" id="terms" name="terms" required>
                                <label for="terms" style="color:#fff;">I agree to the <a href="terms.html" target="_blank" style="color:#19c4bb;">Terms</a> and <a href="privacy-policy.html" target="_blank" style="color:#19c4bb;">Privacy Policy</a>.</label>
                            </div>
                            
                            <button type="submit" class="submit-btn">Send Message</button>
                            <p class="pricing-note" style="margin-top:20px;">We’ll get back to you within 24 hours.</p>
                        </form>
                    </div>
                </div>
            </section>
        </main>
        
        <div id="footer-placeholder"></div>
    </div>
    
    <script src="script.js"></script>
    <script>
        let headerLoaded = false;
        let footerLoaded = false;
        let timeoutId = setTimeout(function() {
            document.querySelector('.content').classList.add('visible');
        }, 1000);

        function checkBothLoaded() {
            if (headerLoaded && footerLoaded) {
                clearTimeout(timeoutId);
                document.querySelector('.content').classList.add('visible');
            }
        }

        fetch('common/header.html')
            .then(r => r.ok ? r.text() : Promise.reject())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                if (typeof initMobileMenu === 'function') initMobileMenu();
                headerLoaded = true;
                checkBothLoaded();
            })
            .catch(() => {
                headerLoaded = true;
                checkBothLoaded();
            });

        fetch('common/footer.html')
            .then(r => r.ok ? r.text() : Promise.reject())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
                footerLoaded = true;
                checkBothLoaded();
            })
            .catch(() => {
                footerLoaded = true;
                checkBothLoaded();
            });
    </script>
</body>
</html>
