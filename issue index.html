<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bula Impact – Site Under Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a2a4a;
            color: #f0f4fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #5f9ea0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .wave {
            margin-top: 30px;
            opacity: 0.7;
        }

        .wave svg {
            width: 80px;
            height: auto;
            fill: #5f9ea0;
        }

        .contact {
            margin-top: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .contact a {
            color: #5f9ea0;
            text-decoration: none;
            border-bottom: 1px dotted #5f9ea0;
        }

        .contact a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bula Impact</h1>
        <p>Our website is currently undergoing a refresh.<br>We’ll be back soon with something special.</p>
        <div class="wave">
            <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
                <path d="M0,25 Q10,10 20,25 T40,25 T60,25 T80,25 T100,25" stroke="#5f9ea0" fill="none" stroke-width="2"/>
                <path d="M0,30 Q10,15 20,30 T40,30 T60,30 T80,30 T100,30" stroke="#5f9ea0" fill="none" stroke-width="1.5" opacity="0.6"/>
            </svg>
        </div>
        <div class="contact">
            In the meantime, feel free to reach out:<br>
            <a href="mailto:hello@bulaimpact.com.fj">hello@bulaimpact.com.fj</a>
        </div>
    </div>
</body>
</html>
